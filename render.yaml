services:
  - type: web
    name: hyacinth-bot
    runtime: python
    buildCommand: |
      apt-get update && apt-get install -y \
        libsoup-3.0-0 \
        libgstreamer-gl1.0-0 \
        libgstreamer-plugins-base1.0-0 \
        libgstreamer1.0-0 \
        libenchant-2-2 \
        libsecret-1-0 \
        libmanette-0.2-0 \
        libopengl0 \
        libgles2 \
        && pip install poetry \
        && poetry config virtualenvs.create false \
        && poetry install --without dev \
        && poetry run playwright install chromium
    startCommand: poetry run hyacinth
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: PORT
        value: 8000
      - key: HYACINTH_TZ
        value: America/Montreal
      - key: HYACINTH_DISCORD_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
